<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon-32.svg"
      sizes="32x32"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon-16.svg"
      sizes="16x16"
    />
    <title>microGPT — An interactive appendix</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/wasm_exec.js"></script>
    <script>
      window.wasmReady = false;
      const go = new Go();
      WebAssembly.instantiateStreaming(
        fetch("/microgpt.wasm"),
        go.importObject,
      ).then((result) => {
        go.run(result.instance);
        window.wasmReady = true;
        window.dispatchEvent(new Event("wasmReady"));
      });
    </script>
  </body>
</html>
